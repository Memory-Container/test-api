<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Night Technology | Register</title>
    <link rel="stylesheet" href="../../share/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="register.css"/>
</head>
<body>
    <div class="card sign-card p-4 mx-3">
        <div class="text-center mb-1">
            <a href="../homepage/homepage.html">
                <img src="../../assets/logo/logo.png" style="height: 60px" />
            </a>
            <h4 class="mt-1 fw-bold text-primary">Register</h4>
        </div>

        <form id="signForm">
            <div class="mb-1">
                <label for="username" class="form-label fw-medium">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fa-solid fa-user text-muted"></i></span>
                    <input type="text" class="form-control" id="username" placeholder="Enter username..." required />
                </div>
                <div class="text-danger" id="username-error"></div>
            </div>
            <div class="mb-1">
                <label for="email" class="form-label fw-medium">Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fa-solid fa-envelope text-muted"></i></span>
                    <input type="email" class="form-control" id="email" placeholder="Enter email..." required />
                </div>
                <div class="text-danger" id="email-error"></div>
            </div>
            <div class="mb-1">
                <label for="password" class="form-label fw-medium">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fa-solid fa-lock text-muted"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="Enter password..." required />
                </div>
                <div class="text-danger" id="password-error"></div>
            </div>
            <div class="text-danger mb-3" id="form-error"></div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="btnSign">Register</button>
            <div class="text-center mt-4">
                Already have an account?
                <a href="/pages/login/" style="font-size: 0.9rem"> Sign in </a>
            </div>
        </form>
    </div>
</body>
<script src="https://kit.fontawesome.com/c4edd7a73c.js" crossorigin="anonymous"></script>
<script src="../../share/js/bootstrap.bundle.min.js"></script>
<script src="../../share/js/user.js"></script>
<script src="register.js"></script>
</html>
