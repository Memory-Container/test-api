<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Night Technology | Products</title>
    <link rel="stylesheet" href="productspage.css" />
    <link rel="stylesheet" href="../../share/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../share/css/layout.css" />
    <link rel="stylesheet" href="../../share/css/share.css" />
</head>
<body>
    <header></header>
    <main>
        <div class="container">
            <div class="titlePage">Our Products</div>
        </div>
        <section class="section">
            <div class="container">
                <div class="row g-3 align-items-center bg-light p-3 rounded shadow-sm">
                    <div class="w-100 d-flex flex-column flex-md-row align-items-start align-items-md-center gap-2" id="filterSearch">
                        <div class="col-12 col-md-3 justify-content-start d-flex gap-1 mt-0" id="filter">
                            <button class="btn btn-sm btn-dark">All</button>
                            <button class="btn btn-sm btn-outline-dark">Mouse</button>
                            <button class="btn btn-sm btn-outline-dark">Keyboard</button>
                            <button class="btn btn-sm btn-outline-dark">Accessories</button>
                        </div>
                        <div class="col-12 col-md-4 ms-auto" id="search">
                            <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Search products..." />
                        </div>
                    </div>
                    <div class="listProduct">
                        <div class="d-grid gap-4" id="productList" style="grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));">
    
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer></footer>
</body>
<script src="https://kit.fontawesome.com/c4edd7a73c.js" crossorigin="anonymous"></script>
<script src="../../share/js/bootstrap.bundle.min.js"></script>
<script src="../../share/js/layout.js"></script>
<script src="../../share/js/product.js"></script>
<script src="../../share/js/user.js"></script>
<script src="../../share/js/cart.js"></script>
<script src="productPage.js"></script>
</html>
